<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AkprintHub - Online Service Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .service-card { transition: all 0.3s; cursor: pointer; border: 1px solid #e2e8f0; }
        .service-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-color: #3b82f6; }
        .header-bg { background: linear-gradient(90deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
</head>
<body class="bg-gray-50">

    <header class="header-bg text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold italic">AkprintHub <span class="text-sm font-normal">by TechnicalMehta</span></h1>
            <div class="hidden md:block">
                <input type="text" placeholder="Search services..." class="px-4 py-2 rounded-full text-black w-80 outline-none">
            </div>
            <div class="flex gap-4">
                <button class="bg-white text-blue-700 px-4 py-1 rounded font-bold">Login</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        
        <h2 class="text-xl font-bold border-l-4 border-blue-600 pl-3 mb-6">Essential & Services</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 mb-10">
            <div onclick="openForm('PAN Card')" class="service-card bg-white p-4 rounded-xl text-center">
                <i class="fas fa-id-card text-3xl text-blue-500 mb-2"></i>
                <p class="text-sm font-semibold">PAN Card Work</p>
                <span class="text-[10px] bg-green-100 text-green-600 px-2 rounded-full">NEW</span>
            </div>
            <div onclick="openForm('Aadhar PVC')" class="service-card bg-white p-4 rounded-xl text-center">
                <i class="fas fa-address-card text-3xl text-orange-500 mb-2"></i>
                <p class="text-sm font-semibold">Aadhar PVC</p>
            </div>
            <div onclick="openForm('EPFO Work')" class="service-card bg-white p-4 rounded-xl text-center">
                <i class="fas fa-university text-3xl text-purple-500 mb-2"></i>
                <p class="text-sm font-semibold">EPFO All Work</p>
            </div>
            <div onclick="openForm('Samagra ID')" class="service-card bg-white p-4 rounded-xl text-center">
                <i class="fas fa-users text-3xl text-red-500 mb-2"></i>
                <p class="text-sm font-semibold">Samagra ID</p>
            </div>
            <div onclick="openForm('Ayushman Card')" class="service-card bg-white p-4 rounded-xl text-center">
                <i class="fas fa-heartbeat text-3xl text-green-500 mb-2"></i>
                <p class="text-sm font-semibold">Ayushman Card</p>
            </div>
            <div onclick="openForm('MSME Registration')" class="service-card bg-white p-4 rounded-xl text-center">
                <i class="fas fa-briefcase text-3xl text-gray-700 mb-2"></i>
                <p class="text-sm font-semibold">MSME Reg.</p>
            </div>
        </div>

        <h2 class="text-xl font-bold border-l-4 border-red-600 pl-3 mb-6">Portal Service (MP Online/CSC)</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            <div onclick="openForm('MP e-District')" class="service-card bg-white p-4 rounded-xl text-center">
                <i class="fas fa-gavel text-3xl text-yellow-600 mb-2"></i>
                <p class="text-sm font-semibold">MP e-District</p>
            </div>
            <div onclick="openForm('Bhoolekh')" class="service-card bg-white p-4 rounded-xl text-center">
                <i class="fas fa-map-marked-alt text-3xl text-green-700 mb-2"></i>
                <p class="text-sm font-semibold">Bhoolekh</p>
            </div>
            <div onclick="openForm('e-Shram Card')" class="service-card bg-white p-4 rounded-xl text-center">
                <i class="fas fa-hard-hat text-3xl text-blue-800 mb-2"></i>
                <p class="text-sm font-semibold">e-Shram Card</p>
            </div>
            <div onclick="openForm('Voter ID')" class="service-card bg-white p-4 rounded-xl text-center">
                <i class="fas fa-vote-yea text-3xl text-blue-400 mb-2"></i>
                <p class="text-sm font-semibold">Voter ID Work</p>
            </div>
        </div>
    </main>

    <div id="serviceModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 relative">
            <button onclick="closeForm()" class="absolute top-4 right-4 text-2xl">&times;</button>
            <h3 id="modalTitle" class="text-xl font-bold mb-4 text-blue-700">Apply for Service</h3>
            
            <form id="applyForm" class="space-y-4">
                <input type="hidden" id="serviceName">
                <input type="text" id="custName" placeholder="Apna Naam Likhe" class="w-full border p-2 rounded" required>
                <input type="tel" id="custPhone" placeholder="WhatsApp Number" class="w-full border p-2 rounded" required>
                <textarea id="custDetails" placeholder="Kaam ki jaankari (Aadhar No. etc)" class="w-full border p-2 rounded"></textarea>
                
                <div class="bg-gray-100 p-4 rounded text-center">
                    <p class="text-xs mb-2 font-bold text-red-600">Scan & Pay to Process Application</p>
                    <img src="https://i.ibb.co/Y7BqL7n/image.png" alt="PhonePe QR" class="w-32 mx-auto mb-2">
                    <p class="font-bold">Amit Kumar</p>
                </div>

                <button type="button" onclick="sendToWhatsApp()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700">
                    <i class="fab fa-whatsapp mr-2"></i> Submit via WhatsApp
                </button>
            </form>
        </div>
    </div>

    <script>
        function openForm(service) {
            document.getElementById('serviceName').value = service;
            document.getElementById('modalTitle').innerText = "Apply for: " + service;
            document.getElementById('serviceModal').classList.remove('hidden');
        }

        function closeForm() {
            document.getElementById('serviceModal').classList.add('hidden');
        }

        function sendToWhatsApp() {
            const service = document.getElementById('serviceName').value;
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const details = document.getElementById('custDetails').value;
            
            if(!name || !phone) { alert("Please fill details"); return; }

            const myNumber = "919000000000"; // YAHAN APNA WHATSAPP NUMBER DAALEIN
            const message = `*New Order: AkprintHub*%0A%0A*Service:* ${service}%0A*Name:* ${name}%0A*Phone:* ${phone}%0A*Details:* ${details}%0A%0A_Payment Screenshot niche attach karein._`;
            
            window.open(`https://wa.me/${myNumber}?text=${message}`, '_blank');
        }
    </script>
</body>
</html>
